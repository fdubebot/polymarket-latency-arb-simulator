name: ci

on:
  push:
  pull_request:

jobs:
  test-lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Test
        run: pytest
      - name: Lint
        run: ruff check .
      - name: Static type check
        run: mypy src
      - name: Packaging
        run: python -m build
